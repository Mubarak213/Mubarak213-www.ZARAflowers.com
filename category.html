<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Category - Flower Shop</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header class="navbar">
  <div class="logo">🌸 FlowerShop</div>
  <nav>
    <a href="index.html">Home</a>
  </nav>
</header>

<!-- CATEGORY TITLE -->
<section class="products">
  <h2 id="category-title">Products</h2>
  <div id="category-products" class="grid"></div>
</section>

<!-- FOOTER -->
<footer>
  <p>© 2026 FlowerShop | All Rights Reserved</p>
</footer>

<!-- SCRIPT -->
<script>
const API_URL = "https://opensheet.elk.sh/1SzJ6PfHvEEJSkRN-Ne5uEVmOLrbst0OfdyPqVwRzkO8/Sheet1";

// Get category from URL
const params = new URLSearchParams(window.location.search);
const type = params.get("type");

// Set category title
if (type) {
  document.getElementById("category-title").innerText =
    type.charAt(0).toUpperCase() + type.slice(1) + " Flowers";
}

// Fetch data
fetch(API_URL)
  .then(res => res.json())
  .then(data => {

    const container = document.getElementById("category-products");

    if (!data || data.length === 0) {
      container.innerHTML = "<p>No products available</p>";
      return;
    }

    // Filter by category
    const filtered = data.filter(p => p.category === type);

    if (filtered.length === 0) {
      container.innerHTML = "<p>No products found in this category</p>";
      return;
    }

    // Render products
    filtered.forEach(product => {
      container.innerHTML += `
        <a href="product.html?id=${product.id}" class="product-card">
          <img src="${product.image}" alt="${product.name}">
          <h3>${product.name}</h3>
          <p>₹${product.price}</p>
          <span class="btn small">View</span>
        </a>
      `;
    });

  })
  .catch(error => {
    console.error("Error loading category:", error);
    document.getElementById("category-products").innerHTML =
      "<p>Failed to load products</p>";
  });
</script>

</body>
</html>
